ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }

    application {
        modules = [ com.mathstack.ApplicationKt.module ]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/mathstack"
    url = ${?DB_URL}
    driver = "org.postgresql.Driver"
    user = "postgres"
    user = ${?DB_USER}
    password = "1234"
    password = ${?DB_PASSWORD}
}

jwt {
    issuer = "mathstack"
    issuer = ${?JWT_ISSUER}
    audience = "mathstack-api"
    audience = ${?JWT_AUDIENCE}
    realm = "mathstack"
    realm = ${?JWT_REALM}
    secret = "change-me-in-production"
    secret = ${?JWT_SECRET}
}
